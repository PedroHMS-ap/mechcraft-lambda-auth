name: lambda-auth-ci-cd

on:
  push:
    branches: [homolog, main]
  pull_request:
    branches: [homolog, main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install
      - run: npm test

  deploy-homolog:
    if: github.event_name == 'push' && github.ref_name == 'homolog'
    needs: test
    runs-on: ubuntu-latest
    environment: homolog
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install --omit=dev
      - name: Package Lambda
        run: zip -r lambda.zip src package.json node_modules
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}
      - name: Deploy homolog
        run: |
          aws lambda update-function-code \
            --function-name "${{ secrets.AWS_LAMBDA_CPF_AUTH_NAME }}" \
            --zip-file fileb://lambda.zip

  deploy-production:
    if: github.event_name == 'push' && github.ref_name == 'main'
    needs: test
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install --omit=dev
      - name: Package Lambda
        run: zip -r lambda.zip src package.json node_modules
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}
      - name: Deploy production
        run: |
          aws lambda update-function-code \
            --function-name "${{ secrets.AWS_LAMBDA_CPF_AUTH_NAME }}" \
            --zip-file fileb://lambda.zip
